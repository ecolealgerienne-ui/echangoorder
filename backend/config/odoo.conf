[options]
; Connexion DB (db_host/db_user/db_password) gérée par les variables
; d'environnement HOST/USER/PASSWORD dans docker-compose.yml — l'entrypoint
; de l'image officielle les injecte au démarrage, pas besoin de les dupliquer ici.
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
admin_passwd = dev_only_change_me
list_db = True
proxy_mode = False
