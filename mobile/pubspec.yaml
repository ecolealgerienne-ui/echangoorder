name: echango_order
description: Echango Order — app mobile client (commande alimentaire, livraison/retrait).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.0
  provider: ^6.1.2
  easy_localization: ^3.0.7
  permission_handler: ^11.3.1
  share_plus: ^10.1.4
  shared_preferences: ^2.3.3
  package_info_plus: ^8.1.2
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
  fonts:
    - family: CasbahDisplay
      fonts:
        - asset: assets/fonts/Lora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
    - family: CasbahDisplayArabic
      fonts:
        - asset: assets/fonts/ElMessiri-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ElMessiri-Bold.ttf
          weight: 700
